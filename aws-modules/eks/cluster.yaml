apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-cluster-01
  region: us-east-1

vpc:
  id: "vpc-xxx"
  subnets:
    public:
      apsoutheast1a:
        id: subnet-xxx
      apsoutheast1b:
        id: subnet-xxx
      apsoutheast1c:
        id: subnet-xxxx

managedNodeGroups:
  - name: ng-1-workers
    labels: { role: workers }
    instanceType: t3.small
    desiredCapacity: 2
    maxPodsPerNode: 100
    minSize: 1
    maxSize: 4
    ssh:
      allow: true
      publicKeyName: xxx
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/eks-cluster-01: "owned"

iam:
  withOIDC: true
  serviceRoleARN: arn:aws:iam::xxxxx:role/xxxx
