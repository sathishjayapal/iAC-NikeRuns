# DO NOT COMMIT real secret values.
# This file documents the keys each Secret must contain. Create the real
# Secrets at deploy time using `kubectl create secret generic ... --from-literal=...`
# (see ../k8s/README.md). Copy this file to `secrets.actual.yaml` (gitignored)
# and fill in placeholders only if you prefer the YAML route.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: microservices
type: Opaque
stringData:
  POSTGRES_DB: eventstracker
  POSTGRES_USER: eventstracker
  POSTGRES_PASSWORD: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: microservices
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: eventstracker
  RABBITMQ_DEFAULT_PASS: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: configserver-secret
  namespace: microservices
type: Opaque
stringData:
  GIT_URI: https://github.com/sathishjayapal/jubilant-memory
  encrypt_key: REPLACE_ME
  username: admin
  pass: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: eventstracker-secret
  namespace: microservices
type: Opaque
stringData:
  SPRING_CLOUD_CONFIG_USERNAME: admin
  SPRING_CLOUD_CONFIG_PASSWORD: REPLACE_ME
  EVENTS_TRACKER_DB_URL: jdbc:postgresql://postgres:5432/eventstracker
  EVENTS_TRACKER_DB_USER: eventstracker
  EVENTS_TRACKER_DB_PASSWORD: REPLACE_ME
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_USERNAME: eventstracker
  RABBITMQ_PASSWORD: REPLACE_ME
