apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: microservices
  labels:
    app: config-server
spec:
  type: ClusterIP
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: microservices
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: config-server
          # Replace <ACCOUNT> and <TAG> before applying.
          image: REPLACE_WITH_ECR_URL/configserver:REPLACE_WITH_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: APP_PORT
              value: "8888"
            - name: SERVER_PORT
              value: "8888"
            - name: GIT_URI
              valueFrom:
                secretKeyRef:
                  name: configserver-secret
                  key: GIT_URI
            - name: encrypt_key
              valueFrom:
                secretKeyRef:
                  name: configserver-secret
                  key: encrypt_key
            - name: username
              valueFrom:
                secretKeyRef:
                  name: configserver-secret
                  key: username
            - name: pass
              valueFrom:
                secretKeyRef:
                  name: configserver-secret
                  key: pass
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
