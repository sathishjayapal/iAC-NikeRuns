apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-cluster-01
  region: us-east-1

vpc:
  id: "vpc-0a1753e65db583cd6"
  subnets:
    public:
      apsoutheast1a:
        id: subnet-0ce25994763da6aae
      apsoutheast1b:
        id: subnet-0725627f1a0851e25
      apsoutheast1c:
        id: subnet-01a73f2ece83afd8d

managedNodeGroups:
  - name: ng-1-workers
    labels: { role: workers }
    instanceType: t2.micro
    desiredCapacity: 2
    maxPodsPerNode: 100
    minSize: 1
    maxSize: 4
    ssh:
      allow: true
      publicKeyName: foreksworkloads
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/eks-cluster-01: "owned"

iam:
  withOIDC: true
  serviceRoleARN: arn:aws:iam::381636780001:role/sathisheksclusterservicerole
