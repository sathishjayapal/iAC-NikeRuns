regions:
  - global
  - us-east-1
  - us-east-2
  - us-west-1
  - us-west-2

account-blocklist:
  - "999999999999" # safety account you never want nuked
accounts:
  "381636780001":
    filters:
      IAMUser:
        - "eksadmin"  # keep at least one admin user to avoid lockout
      IAMUserPolicyAttachment:
        - "eksadmin -> AdministratorAccess"
      IAMUserAccessKey:
        - property: UserName
          value: "eksadmin"